<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlayBlitz Game</title>
<link rel="stylesheet" href="css/style.css">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="js/leaderboard.js"></script>

</head>

<body>

<header class="navbar">
  <div class="logo">PlayBlitz</div>
  <a href="index.html">← Home</a>
</header>

<div class="game-container">

  <canvas id="gameCanvas"></canvas>

  <div class="controls">
    <h2 id="score">Score: 0</h2>
    <button onclick="restartGame()">Restart</button>

    <!-- SHARE BUTTON -->
    <button onclick="shareScore()">📲 Share Score</button>

    <!-- LEADERBOARD -->
    <div id="leaderboard"></div>
  </div>

</div>

<script src="js/sound.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const game = params.get("game");

// LOAD GAME
function loadGame(scriptName){
  const script = document.createElement("script");
  script.src = "js/" + scriptName;
  document.body.appendChild(script);
}

if(game === "taprush") loadGame("taprush.js");
if(game === "memory") {
  document.getElementById("gameCanvas").style.display = "none";
  loadGame("memory.js");
}
if(game === "cardodge") loadGame("cardodge.js");

// SHARE FUNCTION
function shareScore(){
  const score = document.getElementById("score").innerText;
  const text = `🔥 I scored ${score} on PlayBlitz! Can you beat me? https://playblitz.in`;
  const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
  window.open(url, "_blank");
}

// LOAD LEADERBOARD
setTimeout(loadLeaderboard, 1000);
</script>

</body>
</html>
